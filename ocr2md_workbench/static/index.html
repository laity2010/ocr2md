<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OCR 标题标定</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="/vendor/katex/katex.min.css?v=0.16.11" />
    <link rel="stylesheet" href="/styles.css?v=20260625-10" />
  </head>
  <body>
    <header class="toolbar">
      <button id="scanBtn">添加工作目录</button>
      <button id="saveBtn">保存标定</button>
      <button id="exportBtn" data-module-action="headings">导出</button>
      <button id="renumberBtn" data-module-action="headings">生成序号</button>
      <button id="setLocalNoBtn" data-module-action="headings">设逻辑序号</button>
      <button id="setExportDirBtn" data-module-action="headings">设导出目录</button>
      <button id="setAnnotationTypeBtn" data-module-action="annotations">设注释类型</button>
      <button id="setAnnotationGroupBtn" data-module-action="annotations">设注释组</button>
      <button id="bindAnnotationHeadingsBtn" data-module-action="annotations">绑定标题</button>
      <button id="downloadImagesBtn" data-module-action="imgs">下载图片</button>
      <button id="setIllegalBreakConfidenceBtn" data-module-action="illegal_breaks">设置信度</button>
      <button id="scanTranslationBtn" data-module-action="translations">扫描导出文件</button>
      <button id="saveTranslationBtn" data-module-action="translations">保存翻译</button>
      <button id="runTranslationBtn" data-module-action="translations">执行翻译</button>
      <button id="exportTranslationBtn" data-module-action="translations">导出译文</button>
      <button id="setTranslationStatusBtn" data-module-action="translations">设状态</button>
      <button id="translationServiceSettingsBtn" data-module-action="translations">翻译服务设置</button>
      <button id="checkBtn" data-module-action="headings annotations">序号检查</button>
      <button id="clearHistoryBtn">清空历史</button>
      <div class="pane-toggles" aria-label="面板显示">
        <button class="pane-toggle" data-pane-toggle="source" aria-pressed="true">源</button>
        <button class="pane-toggle" data-pane-toggle="data" aria-pressed="true">数据</button>
        <button class="pane-toggle" data-pane-toggle="preview" aria-pressed="true">预览</button>
        <button class="pane-toggle" data-pane-toggle="console" aria-pressed="true">控制台</button>
      </div>
    </header>

    <main class="workspace-layout">
      <div class="workbench-main">
        <section class="source-pane" data-pane="source">
          <div class="module-tabs" aria-label="工作模块">
            <button id="ocrTabBtn" type="button" data-workspace-tab="ocr" aria-pressed="true">OCR 标定</button>
            <button id="translationTabBtn" type="button" data-workspace-tab="translation" aria-pressed="false">翻译</button>
          </div>
          <div class="pane-titlebar">
            <strong id="sourcePaneTitle">source</strong>
            <button class="pane-hide" data-pane-hide="source" title="隐藏源面板">隐藏</button>
          </div>
          <div class="path-combo source-path-combo">
            <input id="inputDir" class="path-input" placeholder="输入 OCR Markdown 目录" />
            <button id="historyToggleBtn" class="history-toggle" title="选择历史目录">⌄</button>
            <div id="dirHistoryMenu" class="history-menu" hidden></div>
          </div>
          <div class="project-card">
            <div class="panel-head">
              <strong id="projectTitle">目录</strong>
              <span id="projectMeta" class="muted">未加载</span>
            </div>
            <div id="directoryTree" class="directory-tree"></div>
          </div>

        </section>

        <div id="mainSplitter" class="splitter vertical-splitter" title="拖拽调整左右面板"></div>

        <section class="result-pane" data-pane="result">
          <section class="data-panel" data-pane="data">
            <div class="panel-head data-head">
              <strong>数据表</strong>
              <button class="pane-hide" data-pane-hide="data" title="隐藏数据表">隐藏</button>
            </div>
            <div class="table-tools">
              <label><input id="onlyEnabled" type="checkbox" /> 仅有效</label>
              <label><input id="hideDisabled" type="checkbox" checked /> 隐藏禁用</label>
              <div id="illegalBreakConfidenceFilter" class="segmented-control" aria-label="断行置信度筛选" hidden>
                <button type="button" data-confidence-filter="high" aria-pressed="true">高</button>
                <button type="button" data-confidence-filter="low" aria-pressed="false">低</button>
                <button type="button" data-confidence-filter="all" aria-pressed="false">全部</button>
              </div>
              <input id="filterText" placeholder="筛选标题/书名/状态" />
              <div id="sortControls" class="sort-controls" aria-label="多字段排序"></div>
              <span id="countInfo"></span>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>index</th>
                    <th>标题</th>
                    <th>层级</th>
                    <th>行号</th>
                    <th>逻辑序号</th>
                    <th>导出文件名</th>
                    <th>状态</th>
                    <th>源文件名</th>
                  </tr>
                </thead>
                <tbody id="headingRows"></tbody>
              </table>
            </div>
          </section>

          <div id="resultSplitter" class="splitter horizontal-splitter" title="拖拽调整数据表和预览"></div>

          <section class="preview-panel" data-pane="preview">
            <div class="context-head">
              <div>
                <strong id="contextTitle">预览窗</strong>
                <div id="contextMeta" class="muted"></div>
              </div>
              <div class="panel-actions">
                <button id="addTitleBtn">新增标题</button>
                <button class="pane-hide" data-pane-hide="preview" title="隐藏预览窗">隐藏</button>
              </div>
            </div>
            <div id="contextLines" class="context-lines"></div>
          </section>
        </section>
      </div>

      <div id="consoleSplitter" class="splitter horizontal-splitter console-splitter" title="拖拽调整控制台"></div>

      <section class="console-panel" data-pane="console">
        <div class="panel-head console-head">
          <strong>控制台输出</strong>
          <button class="pane-hide" data-pane-hide="console" title="隐藏控制台">隐藏</button>
        </div>
        <div id="consoleOutput" class="console-output"></div>
      </section>
    </main>

    <dialog id="manualDialog">
      <form method="dialog" class="dialog-form">
        <h2>新增标题</h2>
        <label>
          标题
          <input id="manualTitle" required />
        </label>
        <label>
          插入位置
          <select id="manualPosition">
            <option value="before">选中行之前</option>
            <option value="after">选中行之后</option>
          </select>
        </label>
        <div class="dialog-actions">
          <button value="cancel">取消</button>
          <button id="confirmManualBtn" value="default">添加</button>
        </div>
      </form>
    </dialog>

    <dialog id="localNoDialog">
      <form method="dialog" class="dialog-form">
        <h2>设置逻辑序号</h2>
        <p id="localNoHint" class="dialog-hint"></p>
        <label>
          逻辑序号
          <input id="localNoInput" required />
        </label>
        <div class="dialog-actions">
          <button value="cancel">取消</button>
          <button id="confirmLocalNoBtn" value="default">应用</button>
        </div>
      </form>
    </dialog>

    <dialog id="exportDirDialog">
      <form method="dialog" class="dialog-form">
        <h2>设置导出目录名</h2>
        <p id="exportDirHint" class="dialog-hint"></p>
        <label>
          导出目录名
          <input id="exportDirInput" />
        </label>
        <div class="dialog-actions">
          <button value="cancel">取消</button>
          <button id="confirmExportDirBtn" value="default">应用</button>
        </div>
      </form>
    </dialog>

    <dialog id="annotationTypeDialog">
      <form method="dialog" class="dialog-form">
        <h2>设置注释类型</h2>
        <p id="annotationTypeHint" class="dialog-hint"></p>
        <label>
          类型
          <select id="annotationTypeInput">
            <option value="引用">引用</option>
            <option value="正文">正文</option>
            <option value="排除">排除</option>
          </select>
        </label>
        <div class="dialog-actions">
          <button value="cancel">取消</button>
          <button id="confirmAnnotationTypeBtn" value="default">应用</button>
        </div>
      </form>
    </dialog>

    <dialog id="annotationGroupDialog">
      <form method="dialog" class="dialog-form">
        <h2>设置注释组号</h2>
        <p id="annotationGroupHint" class="dialog-hint"></p>
        <label>
          注释组号
          <input id="annotationGroupInput" required />
        </label>
        <div class="dialog-actions">
          <button value="cancel">取消</button>
          <button id="confirmAnnotationGroupBtn" value="default">应用</button>
        </div>
      </form>
    </dialog>

    <dialog id="illegalBreakConfidenceDialog">
      <form method="dialog" class="dialog-form">
        <h2>设置断行置信度</h2>
        <p id="illegalBreakConfidenceHint" class="dialog-hint"></p>
        <label>
          置信度
          <select id="illegalBreakConfidenceInput">
            <option value="高">高</option>
            <option value="低">低</option>
          </select>
        </label>
        <div class="dialog-actions">
          <button value="cancel">取消</button>
          <button id="confirmIllegalBreakConfidenceBtn" value="default">应用</button>
        </div>
      </form>
    </dialog>

    <dialog id="translationStatusDialog">
      <form method="dialog" class="dialog-form">
        <h2>设置翻译状态</h2>
        <p id="translationStatusHint" class="dialog-hint"></p>
        <label>
          状态
          <select id="translationStatusInput">
            <option value="未翻译">未翻译</option>
            <option value="已翻译">已翻译</option>
            <option value="需校对">需校对</option>
            <option value="已确认">已确认</option>
          </select>
        </label>
        <div class="dialog-actions">
          <button value="cancel">取消</button>
          <button id="confirmTranslationStatusBtn" value="default">应用</button>
        </div>
      </form>
    </dialog>
    <script src="/vendor/markdown-it.min.js?v=14.1.0"></script>
    <script src="/vendor/purify.min.js?v=3.2.6"></script>
    <script src="/vendor/katex/katex.min.js?v=0.16.11"></script>
    <script src="/app.js?v=20260625-10"></script>
  </body>
</html>
